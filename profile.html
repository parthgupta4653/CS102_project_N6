<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY PROFILE</title>
    <link rel="stylesheet" href="profilep.css">
</head>

<body>
    <div id="mainbox" class="main">


        <div class="box" id="heading">
            <h2>MY PROFILE</h2>
        </div>

        
        <div id="profilepic">
           <img src="profilepic.png" alt="profilepic" id="photo">
           <label for="pic-upload" class="btn2"><a href="#" class="btn2">UPDATE IMAGE</a></label>
           <input type="file" accept="image/jpeg,image/png,image/jpg" title="click here to update your profile pic" id="pic-upload">
           
        </div>
        <div id="details" class="box">
            <pre>NAME   :<span id="name">XYZ</span></pre>
            <pre>ROLLNO :<span id="rollno">******</span></pre>
            <pre>EMAIL  :<span id="email">******@gmail.com</span></pre>
            <pre>BRANCH :<span id="branch">ABCD</span></pre>
            <pre>BATCH  :<span id="batch">2023</span></pre>
            <br>
            <div id="btn">
            <a href="https://www.google.com/" class="btn1">VIEW MY COURSES</a></div>
        </div>
    </div> 
    <script src="profile.js">
    </script>
</body>

</html>
